name: X-NativeImage

on:
  workflow_call:
    inputs:
      project-version:
        required: true
        type: string
    secrets:
      gh-access-token:
        required: true

permissions:
  contents: read

jobs:
  native-image:
    name: '${{ matrix.job.jdkOs }}'
    strategy:
      fail-fast: false
      matrix:
        job:
          - { runner: ubuntu-latest,    jdkOs: Linux }
          - { runner: ubuntu-22.04-arm, jdkOs: LinuxArm }
          - { runner: macos-15-intel,   jdkOs: Osx }
          - { runner: macos-15,         jdkOs: OsxArm }
          - { runner: windows-latest,   jdkOs: Windows }
    runs-on: ${{ matrix.job.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: artifacts
          path: plugins

      - name: Setup Graal
        uses: graalvm/setup-graalvm@f744c72a42b1995d7b0cbc314bde4bace7ac1fe1 # v1.5.0
        with:
          java-version: ${{ vars.GRAAL_JAVA_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          distribution: graalvm

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: ${{ vars.JAVA_DISTRO }}
          cache: gradle

      - name: Version
        if: ${{ endsWith(inputs.project-version, '-SNAPSHOT') != true }}
        run: |
          echo ${PROJECT_VERSION} > VERSION
        env:
          PROJECT_VERSION: ${{ inputs.project-version }}

      - name: Jdks
        shell: bash
        run: |
          rm -rf ~/.gradle/caches/jdks/
          rm -rf plugins/jreleaser/build/jdks/
          ./gradlew :jreleaser:downloadJdkGraal25${{ matrix.job.jdkOs }} :jreleaser:verifyJdkGraal25${{ matrix.job.jdkOs }} :jreleaser:unpackJdkGraal25${{ matrix.job.jdkOs }}

      - name: NativeImage
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # v2.5.0
        with:
          version: early-access
          arguments: assemble --assembler native-image --select-current-platform
          setup-java: false
        env:
          JRELEASER_PROJECT_VERSION: ${{ inputs.project-version }}

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: jreleaser-native-image-${{ runner.os }}-${{ runner.arch }}
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties

      - name: Upload native-image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          retention-days: 1
          name: native-image-${{ runner.os }}-${{ runner.arch }}
          path: |
            out/jreleaser/assemble/jreleaser-native/native-image/*.zip

      - name: Stop Gradle daemon
        shell: bash
        run: ./gradlew -stop
