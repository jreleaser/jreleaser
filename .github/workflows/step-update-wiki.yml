name: X-UpdateWiki

on:
  workflow_call:
    inputs:
      project-version:
        required: true
        type: string
      project-tag:
        required: true
        type: string
      template-params:
        required: false
        type: string
        default: ''
    secrets:
      gh-access-token:
        required: true

permissions:
  actions: read
  id-token: write
  contents: write

jobs:
  update-wiki:
    name: 'Update wiki for Release ${{ inputs.project-tag }}'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Checkout wiki
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: jreleaser/jreleaser.wiki
          path: wiki
          token: ${{ secrets.gh-access-token }}

      - name: Download checksums
        shell: bash
        run: |
          curl -sL https://github.com/jreleaser/jreleaser/releases/download/${JRELEASER_PROJECT_TAG}/checksums_sha256.txt --output checksums_sha256.txt
        env:
          JRELEASER_PROJECT_TAG: ${{ inputs.project-tag }}

      - name: Generate wiki page
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # v2.5.0
        with:
          version: early-access
          arguments: template eval --changelog --input-file src/jreleaser/templates/wiki-release-page.md.tpl --target-directory wiki/Releases ${TEMPLATE_PARAMS}
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.gh-access-token }}
          JRELEASER_PROJECT_VERSION: ${{ inputs.project-version }}
          TEMPLATE_PARAMS: ${{ inputs.template-params }}

      - name: Commit
        shell: bash
        env:
          TAG: ${{ inputs.project-tag }}
          VERSION: ${{ inputs.project-version }}
          GH_BOT_EMAIL: ${{ vars.GH_BOT_EMAIL }}
        run: sh .github/scripts/update-wiki.sh
